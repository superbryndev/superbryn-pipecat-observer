name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check superbryn_pipecat_observer test_import.py

      - name: Format check (ruff format)
        run: ruff format --check superbryn_pipecat_observer test_import.py

      - name: Smoke tests
        run: python test_import.py

      - name: Pytest
        run: pytest -q
        continue-on-error: true

  build-verify:
    name: Build and install wheel in clean env
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Install wheel in fresh venv and import
        run: |
          python -m venv /tmp/verify-env
          /tmp/verify-env/bin/pip install --upgrade pip
          /tmp/verify-env/bin/pip install dist/*.whl
          /tmp/verify-env/bin/python -c "
          from superbryn_pipecat_observer import SuperbrynObserver, __version__
          print('version:', __version__)
          obs = SuperbrynObserver(agent_name='ci-check', api_key='dummy')
          payload = obs._build_payload()
          assert payload['event'] == 'call.completed'
          assert payload['call']['metadata']['agent_name'] == 'ci-check'
          print('wheel install OK')
          "

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
